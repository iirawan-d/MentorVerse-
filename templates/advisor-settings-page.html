<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advisor Settings</title>
  <meta name="description" content="Advisor account settings - manage your profile information, credentials, and preferences." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='advisor-settings-page.css') }}">

</head>
<body>

  <!-- Top Brand Bar -->
  <div class="as-brand-bar">
    <a href="/Home-page">MentorVerse</a>
  </div>

  <div class="as-shell">

    <!-- Sidebar -->
    <aside class="as-sidebar">
      <div class="as-profile-box">
        <div class="as-avatar">
          <img src="images/image_girls_profile.png" alt="Avatar" />
        </div>
        <span class="as-welcome">Welcome, Advisor Name</span>
        <span class="as-year">Academic Year 2026</span>
      </div>

      <nav class="as-nav">
        <a href="/advisor-students-list-page" id="nav-dashboard">
          <i class="fa-solid fa-border-all as-nav-icon"></i> Student List
        </a>
        <a href="/advisor-notification-page" class="adv-nav-item" id="nav-notifications">
          <i class="fa-solid fa-bell"></i> Notifications
        </a>
        <a href="/advisor-settings-page" class="active" id="nav-settings">
          <i class="fa-solid fa-gear as-nav-icon"></i> Settings
        </a>
      </nav>


    </aside> 

    <!-- Main -->
    <main class="as-main">

      <!-- Page Head -->
      <div class="as-page-head">
        <p class="as-eyebrow">ADVISOR CONTROL PANEL</p>
        <h1 class="as-page-title">Account Settings</h1>
      </div>

      <!-- Advisor Profile Card -->
      <div class="as-card">
        <h2 class="as-card-title">
          <i class="fa-solid fa-user-pen as-card-title-icon"></i> Advisor Profile
        </h2>

        <div class="as-form-grid">
          <div class="as-field">
            <label for="full-name">FULL NAME</label>
            <input type="text" id="full-name" value="Advisor Name" />
          </div>

          <div class="as-field">
            <label for="academic-title">ACADEMIC TITLE</label>
            <input type="text" id="academic-title" value="Advisor Title" />
          </div>

          <div class="as-field full">
            <label for="department">DEPARTMENT</label>
            <select id="department">
              <option selected>Computer Science</option>
              <option>Mechanical Engineering</option>
              <option>Business Analytics</option>
              <option>Architecture</option>
              <option>Mathematics</option>
            </select>
          </div>

          <div class="as-field full">
            <label for="bio">BIO</label>
            <textarea id="bio">Specializing in AI and Machine Learning research. Guiding post-graduate students for over 12 years.</textarea>
          </div>

          <div class="as-field full">
            <label for="office-location">OFFICE LOCATION</label>
            <input type="text" id="office-location" value="Building 4, Room 202, Campus" />
          </div>
        </div>

        <div class="as-btn-row">
          <button class="as-btn-primary" id="update-profile-btn">Update Advisor Profile</button>
        </div>
      </div>

      <!-- Security & Access Card -->
      <div class="as-card">
        <h2 class="as-card-title">
          <i class="fa-solid fa-lock as-card-title-icon"></i> Security & Access
        </h2>

        <div class="as-form-grid">
          <div class="as-field full">
            <label for="current-password">CURRENT PASSWORD</label>
            <input type="password" id="current-password" value="12345678" />
          </div>

          <div class="as-field">
            <label for="new-password">NEW PASSWORD</label>
            <input type="password" id="new-password" value="newpassword" />
          </div>

          <div class="as-field">
            <label for="confirm-password">CONFIRM NEW PASSWORD</label>
            <input type="password" id="confirm-password" value="newpassword" />
          </div>
        </div>

        <div class="as-btn-row">
          <button class="as-btn-outline" id="update-credentials-btn">Update Credentials</button>
        </div>
      </div>

    </main>

  </div>

  <!-- Footer -->
  <footer class="as-footer">
    <div class="as-footer-inner">
      <div class="as-footer-left">
        <div class="as-footer-brand">MentorVerse</div>
        <p>&copy; 2026 MENTORVERSE.</p>
      </div>
      <div class="as-footer-links">
            <a href="/Home-page">HOME</a>
            <a href="/faq-page">FAQ</a>
            <a href="/contact-us-page">CONTACT US</a>
            <a href="/about-us-page">ABOUT US</a>
      </div>
    </div>
  </footer>

</body>
</html>
